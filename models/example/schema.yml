version: 2

models:
  - name: my_first_dbt_model
    description: A starter model with a small inline dataset.
    columns:
      - name: id
        description: The primary key for this model.
        tests:
          - unique
          - not_null

  - name: my_second_dbt_model
    description: A downstream starter model that filters my_first_dbt_model.
    columns:
      - name: id
        description: The primary key for this model.
        tests:
          - unique
          - not_null
