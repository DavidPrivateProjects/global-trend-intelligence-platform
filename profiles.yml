global_trend_intelligence_platform:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('DBT_BIGQUERY_PROJECT') }}"
      dataset: "{{ env_var('DBT_BIGQUERY_DATASET', 'dbt_dev') }}"
      location: "{{ env_var('DBT_BIGQUERY_LOCATION', 'US') }}"
      threads: "{{ env_var('DBT_THREADS', 4) | int }}"
      job_execution_timeout_seconds: 300
      job_retries: 1
